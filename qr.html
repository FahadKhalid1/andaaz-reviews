<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andaaz QR Code - Print Ready</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle { color: #777; font-size: 14px; margin-bottom: 32px; }

    /* Print-ready QR card */
    .qr-card {
      width: 400px;
      background: #111;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .qr-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .qr-logo {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 700;
      color: #C9A84C; letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 4px;
      position: relative;
    }
    .qr-tagline {
      font-size: 10px; letter-spacing: 2.5px;
      text-transform: uppercase; color: #9A9080;
      margin-bottom: 24px; position: relative;
    }
    .qr-divider {
      width: 50px; height: 1px;
      background: #C9A84C; margin: 0 auto 24px;
      opacity: 0.4; position: relative;
    }
    .qr-container {
      background: white;
      border-radius: 16px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 24px;
      position: relative;
    }
    #qrCode canvas, #qrCode img {
      display: block;
    }
    .qr-cta {
      font-size: 18px; font-weight: 600;
      color: #C9A84C; margin-bottom: 6px;
      position: relative;
    }
    .qr-cta-sub {
      font-size: 12px; color: #9A9080;
      position: relative;
    }
    .qr-stars {
      font-size: 28px; letter-spacing: 3px;
      color: #C9A84C; margin: 16px 0 8px;
      position: relative;
    }
    .qr-url {
      font-size: 11px; color: #666;
      margin-top: 16px; position: relative;
      letter-spacing: 0.5px;
    }
    .powered {
      font-size: 10px; color: #555;
      margin-top: 12px; position: relative;
    }
    .powered span { color: #C9A84C; }

    /* Controls */
    .controls {
      margin-top: 32px;
      display: flex; gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #C9A84C; color: #111;
    }
    .btn-primary:hover { background: #E8D48B; }
    .btn-secondary {
      background: #222; color: #C9A84C;
      border: 1px solid #C9A84C;
    }
    .btn-secondary:hover { background: #333; }

    /* URL input */
    .url-config {
      margin-top: 24px;
      width: 400px;
      text-align: center;
    }
    .url-config label {
      font-size: 12px; color: #777;
      display: block; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .url-config input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    .url-config input:focus { border-color: #C9A84C; }
    .url-config .hint {
      font-size: 11px; color: #999;
      margin-top: 6px;
    }
    .btn-update {
      margin-top: 10px;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      background: #C9A84C;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Size selector */
    .size-selector {
      margin-top: 20px;
      display: flex; gap: 8px;
      justify-content: center;
    }
    .size-btn {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: white;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .size-btn.active {
      border-color: #C9A84C;
      background: rgba(201,168,76,0.1);
      color: #C9A84C;
    }

    @media print {
      body { background: white; padding: 0; }
      .controls, .url-config, .subtitle, h1, .size-selector { display: none; }
      .qr-card { border-radius: 0; }
    }
  </style>
</head>
<body>

  <h1>Andaaz Review QR Code</h1>
  <p class="subtitle">Print-ready QR code for table cards, receipts & signage</p>

  <div class="qr-card" id="qrCard">
    <div class="qr-logo">Andaaz</div>
    <div class="qr-tagline">Cuisine Fusion Franco-Indienne</div>
    <div class="qr-divider"></div>
    <div class="qr-cta">Loved your meal?</div>
    <div class="qr-cta-sub">Scan to leave us a quick review</div>
    <div class="qr-stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
    <div class="qr-container">
      <div id="qrCode"></div>
    </div>
    <div class="qr-url" id="displayUrl">andaaz.stepupai.com</div>
    <div class="powered">Powered by <span>Step UpAI</span></div>
  </div>

  <div class="size-selector">
    <button class="size-btn" onclick="setSize('small')" data-size="small">Small (table tent)</button>
    <button class="size-btn active" onclick="setSize('medium')" data-size="medium">Medium (A6)</button>
    <button class="size-btn" onclick="setSize('large')" data-size="large">Large (A5)</button>
  </div>

  <div class="url-config">
    <label>Review Page URL</label>
    <input type="text" id="urlInput" value="https://andaaz.stepupai.com" placeholder="https://andaaz.stepupai.com">
    <div class="hint">This URL will be encoded in the QR code. Update when your domain is live.</div>
    <button class="btn-update" onclick="updateQR()">Update QR Code</button>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-secondary" onclick="downloadQR()">⬇️ Download PNG</button>
    <button class="btn btn-secondary" onclick="downloadCard()">🎴 Download Card</button>
  </div>

<script>
  let currentUrl = 'https://andaaz.stepupai.com';
  let qrCellSize = 6;

  function generateQR(url) {
    const qr = qrcode(0, 'M');
    qr.addData(url);
    qr.make();

    const container = document.getElementById('qrCode');
    // Create canvas for high-res output
    const moduleCount = qr.getModuleCount();
    const cellSize = qrCellSize;
    const size = moduleCount * cellSize;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);

    // Draw modules
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (qr.isDark(row, col)) {
          ctx.fillStyle = '#111111';
          ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    container.innerHTML = '';
    container.appendChild(canvas);
  }

  function updateQR() {
    const input = document.getElementById('urlInput');
    currentUrl = input.value.trim() || 'https://andaaz.stepupai.com';

    // Update display URL (show clean domain)
    try {
      const urlObj = new URL(currentUrl);
      document.getElementById('displayUrl').textContent = urlObj.hostname;
    } catch {
      document.getElementById('displayUrl').textContent = currentUrl.replace(/^https?:\/\//, '');
    }

    generateQR(currentUrl);
  }

  function setSize(size) {
    const card = document.getElementById('qrCard');
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-size="${size}"]`).classList.add('active');

    switch (size) {
      case 'small':
        card.style.width = '280px';
        card.style.padding = '32px 28px';
        qrCellSize = 4;
        break;
      case 'medium':
        card.style.width = '400px';
        card.style.padding = '48px 40px';
        qrCellSize = 6;
        break;
      case 'large':
        card.style.width = '520px';
        card.style.padding = '56px 48px';
        qrCellSize = 8;
        break;
    }
    generateQR(currentUrl);
  }

  function downloadQR() {
    const canvas = document.querySelector('#qrCode canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'andaaz-review-qr.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function downloadCard() {
    // Use html2canvas-like approach: render card to canvas
    const card = document.getElementById('qrCard');
    // Simple: screenshot via DOM-to-image fallback
    // For now, trigger print which gives best quality
    alert('For the best quality card export, use Print → Save as PDF.\n\nThe QR code PNG can be downloaded separately with the Download PNG button.');
  }

  // Init
  generateQR(currentUrl);
</script>
</body>
</html>
